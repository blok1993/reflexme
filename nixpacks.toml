# Railway (Nixpacks): ставим зависимости из корня монорепозитория.
# Root Directory в Railway — либо «predictor», либо корень Git при структуре repo/predictor/apps/...
# Скрипт scripts/run-prisma.cjs сам находит prisma/schema.prisma в этих случаях.

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build:backend"]

[start]
cmd = "npm run start"
